<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>pukangram v2</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0e14; --bg2: #13141c; --bg3: #1a1b26;
  --border: #252638; --accent: #6c63ff; --accent2: #ff6584; --accent3: #43e97b;
  --text: #e8e9f0; --text2: #8889a8; --text3: #555670;
  --bubble-me: #6c63ff; --bubble-them: #1e1f2e;
  --online: #43e97b; --shadow: 0 8px 32px rgba(0,0,0,0.4);
}
/* THEMES */
body.theme-rose { --accent:#ff6584; --bubble-me:#ff6584; }
body.theme-green { --accent:#43e97b; --bubble-me:#2db866; }
body.theme-orange { --accent:#f7971e; --bubble-me:#f7971e; }
body.theme-pink { --accent:#f093fb; --bubble-me:#c850c0; }
body.theme-blue { --accent:#4facfe; --bubble-me:#0099ff; }
body.theme-light { --bg:#f0f2f5; --bg2:#ffffff; --bg3:#e8eaed; --border:#d1d5db; --text:#111827; --text2:#6b7280; --text3:#9ca3af; --bubble-them:#e5e7eb; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; height:100dvh; overflow:hidden; }

/* SCROLLBAR */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* AUTH */
#auth-screen {
  display:flex; align-items:center; justify-content:center;
  height:100vh; height:100dvh; background:var(--bg); position:relative; overflow:hidden;
}
#auth-screen::before {
  content:''; position:absolute; width:600px; height:600px;
  background:radial-gradient(circle, rgba(108,99,255,0.15) 0%, transparent 70%);
  top:-200px; left:-100px; pointer-events:none;
}
.auth-card {
  background:var(--bg2); border:1px solid var(--border); border-radius:24px;
  padding:40px 32px; width:420px; max-width:95vw; max-height:95vh; overflow-y:auto;
  position:relative; z-index:1; box-shadow:var(--shadow);
  animation:slideUp 0.5s cubic-bezier(0.16,1,0.3,1);
}
@keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

.auth-logo { display:flex; align-items:center; gap:12px; margin-bottom:28px; }
.logo-icon { width:44px; height:44px; border-radius:14px; overflow:hidden; flex-shrink:0; }
.logo-icon img { width:100%; height:100%; object-fit:cover; border-radius:10px; }
.logo-text { font-family:'Syne',sans-serif; font-size:22px; font-weight:700; }

.auth-title { font-family:'Syne',sans-serif; font-size:26px; font-weight:700; margin-bottom:6px; }
.auth-sub { color:var(--text2); font-size:14px; margin-bottom:24px; font-weight:300; }

.input-group { margin-bottom:14px; }
.input-group label { display:block; font-size:11px; font-weight:500; color:var(--text2); text-transform:uppercase; letter-spacing:1px; margin-bottom:7px; }
.input-group input {
  width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:12px;
  padding:12px 16px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:15px; outline:none; transition:border-color 0.2s;
}
.input-group input:focus { border-color:var(--accent); }
.pfx { position:relative; }
.pfx input { padding-left:28px; }
.pfx::before { content:'@'; position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--accent); font-weight:600; pointer-events:none; }

.auth-btn {
  width:100%; background:linear-gradient(135deg,var(--accent),#8b85ff); border:none;
  border-radius:12px; padding:14px; color:white; font-family:'DM Sans',sans-serif;
  font-size:16px; font-weight:500; cursor:pointer; margin-top:4px; transition:opacity 0.2s,transform 0.1s;
}
.auth-btn:active { transform:scale(0.98); }

.divider { display:flex; align-items:center; gap:12px; margin:16px 0; color:var(--text3); font-size:13px; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }

.google-btn {
  width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:12px;
  padding:13px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:15px;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:background 0.2s;
}
.google-btn:hover { background:var(--border); }
.google-icon { width:20px; height:20px; }

.auth-error {
  background:rgba(255,101,132,0.1); border:1px solid rgba(255,101,132,0.3);
  border-radius:10px; padding:10px 14px; color:var(--accent2); font-size:14px; margin-bottom:14px; display:none;
}
.auth-switch { text-align:center; margin-top:20px; color:var(--text2); font-size:14px; }
.auth-switch a { color:var(--accent); cursor:pointer; }

/* APP */
#app { display:none; height:100vh; height:100dvh; overflow:hidden; }
.app-layout { display:flex; height:100%; }

/* SIDEBAR */
.sidebar {
  width:320px; min-width:320px; background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; height:100%; transition:transform 0.3s ease;
}
.sidebar-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
.sidebar-logo { display:flex; align-items:center; gap:8px; flex:1; }
.sidebar-logo .logo-icon { width:32px; height:32px; border-radius:10px; }
.sidebar-logo .logo-text { font-family:'Syne',sans-serif; font-size:17px; font-weight:700; }
.header-actions { display:flex; gap:6px; }
.icon-btn {
  width:36px; height:36px; background:var(--bg3); border:1px solid var(--border);
  border-radius:10px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:16px; transition:background 0.2s; color:var(--text); user-select:none;
}
.icon-btn:hover { background:var(--border); }

.search-wrap { padding:12px 16px; border-bottom:1px solid var(--border); }
.search-wrap input {
  width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:10px;
  padding:9px 14px; color:var(--text); font-size:14px; outline:none; font-family:'DM Sans',sans-serif;
}
.search-wrap input::placeholder { color:var(--text3); }

.tabs { display:flex; padding:0 12px; border-bottom:1px solid var(--border); }
.tab-btn {
  flex:1; padding:10px 0; background:none; border:none; color:var(--text2);
  font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer;
  border-bottom:2px solid transparent; transition:color 0.2s,border-color 0.2s;
}
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

.chat-list { flex:1; overflow-y:auto; }
.chat-item {
  display:flex; align-items:center; gap:12px; padding:12px 16px; cursor:pointer;
  transition:background 0.15s; border-bottom:1px solid rgba(37,38,56,0.5);
}
.chat-item:hover { background:var(--bg3); }
.chat-item.active { background:rgba(108,99,255,0.08); }

.avatar {
  width:44px; height:44px; border-radius:14px; display:flex; align-items:center;
  justify-content:center; font-size:16px; font-weight:600; flex-shrink:0; color:white;
  font-family:'Syne',sans-serif; overflow:hidden;
}
.avatar img { width:100%; height:100%; object-fit:cover; border-radius:14px; }

.chat-info { flex:1; min-width:0; }
.chat-name { font-weight:500; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chat-preview { color:var(--text2); font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.chat-meta { text-align:right; flex-shrink:0; }
.chat-time { color:var(--text3); font-size:11px; }

.sidebar-profile {
  padding:12px 16px; border-top:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.settings-btn {
  width:36px; height:36px; background:var(--bg3); border:1px solid var(--border);
  border-radius:10px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:18px; transition:background 0.2s, border-color 0.2s; flex-shrink:0;
}
.settings-btn:hover { background:var(--accent); border-color:var(--accent); }.profile-info { flex:1; min-width:0; }
.profile-name { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.profile-username { font-size:12px; color:var(--accent); }


.no-chats { text-align:center; padding:40px 20px; color:var(--text2); font-size:14px; line-height:1.6; }

/* CHAT MAIN */
.chat-main { flex:1; display:flex; flex-direction:column; height:100%; overflow:hidden; background:var(--bg); }
.chat-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text2); gap:12px; }
.chat-empty .icon { font-size:48px; }

.chat-header {
  padding:14px 20px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px; background:var(--bg2);
}
.back-btn { display:none; background:none; border:none; color:var(--accent); font-size:24px; cursor:pointer; padding:0 4px; }
.chat-header-info { flex:1; }
.chat-header-name { font-weight:600; font-size:16px; font-family:'Syne',sans-serif; }
.chat-header-status { font-size:12px; color:var(--online); margin-top:1px; }

.messages-container { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:2px; }

.message-group { display:flex; flex-direction:column; margin:4px 0; max-width:75%; }
.message-group.me { align-self:flex-end; align-items:flex-end; }
.message-group.them { align-self:flex-start; align-items:flex-start; }

.message {
  background:var(--bubble-them); border-radius:18px 18px 18px 4px;
  padding:10px 14px; font-size:15px; line-height:1.5; word-break:break-word;
}
.message-group.me .message { background:var(--bubble-me); border-radius:18px 18px 4px 18px; color:white; }
.msg-time { font-size:11px; color:var(--text3); margin:3px 4px 0; }
.msg-sender { font-size:12px; color:var(--accent); margin-bottom:4px; font-weight:500; }
.date-divider { text-align:center; color:var(--text3); font-size:12px; padding:8px 0; }

/* REACTIONS */
.reactions-bar { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.reaction-pill {
  background:var(--bg3); border:1px solid var(--border); border-radius:20px;
  padding:2px 8px; font-size:13px; cursor:pointer; display:flex; align-items:center; gap:4px;
  transition:background 0.15s; user-select:none;
}
.reaction-pill.mine { background:rgba(108,99,255,0.15); border-color:var(--accent); }
.reaction-pill:hover { background:var(--border); }
.reaction-count { font-size:12px; color:var(--text2); }
.reaction-picker {
  position:absolute; background:var(--bg2); border:1px solid var(--border);
  border-radius:16px; padding:8px; display:flex; gap:6px; z-index:50;
  box-shadow:var(--shadow); font-size:22px;
}
.reaction-picker span { cursor:pointer; transition:transform 0.15s; }
.reaction-picker span:hover { transform:scale(1.3); }

/* REPLY */
.reply-preview {
  background:var(--bg3); border-left:3px solid var(--accent); border-radius:0 10px 10px 0;
  padding:6px 10px; margin-bottom:4px; font-size:13px; color:var(--text2);
  display:flex; justify-content:space-between; align-items:center;
}
.reply-preview b { color:var(--text); font-size:12px; display:block; margin-bottom:2px; }
.reply-cancel { cursor:pointer; color:var(--text3); font-size:18px; padding:0 4px; }
.reply-bubble {
  background:rgba(108,99,255,0.1); border-left:3px solid var(--accent);
  border-radius:0 8px 8px 0; padding:5px 10px; margin-bottom:6px; font-size:12px; color:var(--text2);
}
.reply-bubble b { color:var(--accent); display:block; margin-bottom:2px; }

/* TYPING */
.typing-wrap { padding:4px 16px; min-height:20px; }
.typing-indicator { display:none; align-items:center; gap:6px; color:var(--text2); font-size:13px; }
.typing-indicator.show { display:flex; }
.typing-dots { display:flex; gap:3px; }
.typing-dot { width:6px; height:6px; background:var(--text3); border-radius:50%; animation:typingBounce 1.2s infinite; }
.typing-dot:nth-child(2) { animation-delay:0.2s; }
.typing-dot:nth-child(3) { animation-delay:0.4s; }
@keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* UNREAD BADGE */
.unread-badge {
  background:var(--accent); color:white; border-radius:10px; font-size:11px;
  font-weight:700; min-width:18px; height:18px; display:flex; align-items:center;
  justify-content:center; padding:0 5px;
}

/* MSG CONTEXT MENU */
.msg-actions {
  position:absolute; background:var(--bg2); border:1px solid var(--border);
  border-radius:12px; padding:6px; z-index:50; box-shadow:var(--shadow);
  display:flex; flex-direction:column; gap:2px; min-width:160px;
}
.msg-action-item {
  padding:8px 12px; border-radius:8px; cursor:pointer; font-size:14px;
  display:flex; align-items:center; gap:8px; transition:background 0.15s;
}
.msg-action-item:hover { background:var(--bg3); }
.msg-action-item.danger { color:var(--accent2); }

/* MESSAGE WRAPPER for context menu */
.message-wrap { position:relative; }

/* EDIT MODE */
.editing-indicator {
  background:rgba(108,99,255,0.1); border-left:3px solid var(--accent);
  border-radius:0 10px 10px 0; padding:6px 10px; margin-bottom:4px;
  font-size:13px; color:var(--text2); display:none;
  justify-content:space-between; align-items:center;
}
.editing-indicator.show { display:flex; }
.edit-cancel { cursor:pointer; color:var(--text3); font-size:18px; }

/* THEMES PANEL */
.themes-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:16px; }
.theme-dot {
  width:100%; aspect-ratio:1; border-radius:12px; cursor:pointer;
  border:3px solid transparent; transition:border-color 0.2s; display:flex;
  align-items:center; justify-content:center; font-size:18px;
}
.theme-dot.active { border-color:var(--text); }

/* BIO */
.bio-text { color:var(--text2); font-size:14px; margin-top:2px; font-style:italic; }


/* IMAGE / FILE / AUDIO messages */


/* CHAT INPUT */
.chat-input-area {
  padding:12px 16px; padding-bottom:max(12px, env(safe-area-inset-bottom));
  border-top:1px solid var(--border); background:var(--bg2);
}

.input-row {
  display:flex; gap:8px; align-items:flex-end;
  background:var(--bg3); border:1px solid var(--border); border-radius:16px; padding:8px 10px;
}
.input-row textarea {
  flex:1; background:none; border:none; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:15px; outline:none; resize:none;
  max-height:120px; min-height:24px; line-height:1.5; padding:0;
}

.send-btn {
  width:36px; height:36px; background:linear-gradient(135deg,var(--accent),#8b85ff);
  border:none; border-radius:10px; color:white; font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:opacity 0.2s,transform 0.1s;
}
.send-btn:active { transform:scale(0.95); }

/* MODALS */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:100;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.modal {
  background:var(--bg2); border:1px solid var(--border); border-radius:20px;
  padding:28px 24px; width:100%; max-width:420px; max-height:90vh; overflow-y:auto;
  animation:slideUp 0.3s ease;
}
.modal-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; margin-bottom:20px; }
.modal input, .modal textarea {
  width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:12px;
  padding:12px 14px; color:var(--text); font-size:15px; outline:none; margin-bottom:12px;
  font-family:'DM Sans',sans-serif;
}
.modal input:focus, .modal textarea:focus { border-color:var(--accent); }
.modal-pfx { position:relative; }
.modal-pfx input { padding-left:28px; }
.modal-pfx::before { content:'@'; position:absolute; left:12px; top:12px; color:var(--accent); font-weight:600; pointer-events:none; }
.modal-error {
  background:rgba(255,101,132,0.1); border:1px solid rgba(255,101,132,0.3);
  border-radius:10px; padding:10px 14px; color:var(--accent2); font-size:13px; margin-bottom:12px; display:none;
}
.modal-success {
  background:rgba(67,233,123,0.1); border:1px solid rgba(67,233,123,0.3);
  border-radius:10px; padding:10px 14px; color:var(--accent3); font-size:13px; margin-bottom:12px; display:none;
}
.modal-found {
  background:rgba(67,233,123,0.08); border:1px solid rgba(67,233,123,0.2);
  border-radius:12px; padding:14px; margin-bottom:12px; display:none;
}
.found-user-card { display:flex; align-items:center; gap:12px; }
.found-name { font-weight:600; font-size:15px; }
.found-username { font-size:13px; color:var(--accent); }
.modal-actions { display:flex; gap:10px; margin-top:4px; }
.btn-cancel {
  flex:1; padding:12px; background:var(--bg3); border:1px solid var(--border);
  border-radius:12px; color:var(--text2); cursor:pointer; font-size:14px; font-family:'DM Sans',sans-serif;
}
.btn-primary {
  flex:2; padding:12px; background:linear-gradient(135deg,var(--accent),#8b85ff);
  border:none; border-radius:12px; color:white; cursor:pointer; font-size:14px;
  font-weight:500; font-family:'DM Sans',sans-serif;
}
.btn-danger {
  flex:1; padding:12px; background:rgba(255,101,132,0.1); border:1px solid rgba(255,101,132,0.3);
  border-radius:12px; color:var(--accent2); cursor:pointer; font-size:14px; font-family:'DM Sans',sans-serif;
}
.member-chips { display:flex; flex-wrap:wrap; gap:6px; margin:0 0 12px; }
.member-chip {
  background:rgba(108,99,255,0.15); border:1px solid rgba(108,99,255,0.3);
  border-radius:20px; padding:4px 10px; font-size:13px; display:flex; align-items:center; gap:6px;
}
.member-chip .rm { cursor:pointer; color:var(--text3); }
.add-row { display:flex; gap:8px; margin-bottom:12px; }
.add-row .modal-pfx { flex:1; position:relative; }
.add-row .modal-pfx input { margin-bottom:0; }
.add-btn {
  padding:12px 16px; background:var(--accent); border:none; border-radius:12px;
  color:white; cursor:pointer; font-size:16px;
}

/* SETTINGS */
.settings-section { margin-bottom:24px; }
.settings-label { font-size:11px; font-weight:500; color:var(--text2); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
.settings-item {
  display:flex; align-items:center; gap:12px; padding:12px 0;
  border-bottom:1px solid var(--border); cursor:pointer;
}
.settings-item:last-child { border-bottom:none; }
.settings-item-icon { font-size:20px; width:32px; text-align:center; }
.settings-item-info { flex:1; }
.settings-item-title { font-size:15px; font-weight:500; }
.settings-item-sub { font-size:13px; color:var(--text2); margin-top:2px; }
.settings-item-arrow { color:var(--text3); }

.avatar-edit-wrap { display:flex; flex-direction:column; align-items:center; gap:16px; margin-bottom:20px; }
.avatar-edit-wrap .big-avatar {
  width:80px; height:80px; border-radius:20px; font-size:28px;
  display:flex; align-items:center; justify-content:center; color:white;
  font-family:'Syne',sans-serif; overflow:hidden; cursor:pointer; position:relative;
}
.avatar-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,0.5);
  display:flex; align-items:center; justify-content:center; border-radius:20px;
  opacity:0; transition:opacity 0.2s; font-size:22px;
}
.big-avatar:hover .avatar-overlay { opacity:1; }
.avatar-options { display:flex; gap:10px; }
.avatar-opt-btn {
  flex:1; padding:10px; background:var(--bg3); border:1px solid var(--border);
  border-radius:12px; color:var(--text); cursor:pointer; font-size:13px;
  font-family:'DM Sans',sans-serif; display:flex; align-items:center; justify-content:center; gap:6px;
}
.avatar-opt-btn:hover { background:var(--border); }

/* NOTIFICATION */
#notification {
  position:fixed; top:20px; right:20px; background:var(--bg2); border:1px solid var(--border);
  border-radius:14px; padding:14px 18px; box-shadow:var(--shadow); z-index:300;
  transform:translateX(120%); transition:transform 0.3s cubic-bezier(0.16,1,0.3,1); max-width:280px;
}
#notification.show { transform:translateX(0); }
#notif-title { font-weight:600; font-size:14px; margin-bottom:3px; }
#notif-body { font-size:13px; color:var(--text2); }



/* MOBILE */
@media (max-width:640px) {
  .sidebar { position:fixed; left:0; top:0; bottom:0; width:100%; z-index:50; }
  .sidebar.hidden { transform:translateX(-100%); }
  .chat-main { position:fixed; left:0; top:0; right:0; bottom:0; display:none; }
  .chat-main.visible { display:flex; }
  .back-btn { display:flex !important; }
  #notification { left:16px; right:16px; top:16px; max-width:none; }
  .message-group { max-width:85%; }
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">

<!-- APP -->
<div id="app">
  <div class="app-layout">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="logo-icon"><img id="app-logo-img" src="" alt="logo"></div>
          <div class="logo-text">pukangram</div>
        </div>
        <div class="header-actions">
          <div class="icon-btn" onclick="openNewChat()">✏️</div>
          <div class="icon-btn" onclick="openNewGroup()">👥</div>
        </div>
      </div>
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="🔍 Поиск..." oninput="filterChats()">
      </div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('all',this)">Все</button>
        <button class="tab-btn" onclick="switchTab('direct',this)">Личные</button>
        <button class="tab-btn" onclick="switchTab('groups',this)">Группы</button>
      </div>
      <div class="chat-list" id="chat-list"></div>
      <div class="sidebar-profile">
        <div class="avatar" id="my-avatar" style="width:36px;height:36px;font-size:14px;border-radius:10px;background:linear-gradient(135deg,#6c63ff,#8b85ff)"></div>
        <div class="profile-info">
          <div class="profile-name" id="my-name"></div>
          <div class="profile-username" id="my-username"></div>
        </div>
        <div class="settings-btn" onclick="openSettings()" title="Настройки">⚙️</div>
      </div>
    </div>
    <div class="chat-main" id="chat-main">
      <div class="chat-empty">
        <div class="icon">💬</div>
        <p>Выберите чат или начните новый</p>
      </div>
    </div>
  </div>
</div>

<!-- NEW CHAT MODAL -->
<div id="new-chat-modal" style="display:none">
  <div class="modal-overlay" onclick="closeModals()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">✏️ Новый чат</div>
      <div id="new-chat-error" class="modal-error"></div>
      <div class="modal-pfx">
        <input type="text" id="new-chat-username" placeholder="username" autocomplete="off"
          oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_]/g,'')"
          onkeydown="if(event.key==='Enter')findUser()">
      </div>
      <div id="found-user" class="modal-found"></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModals()">Отмена</button>
        <button class="btn-primary" onclick="findUser()">Найти</button>
      </div>
    </div>
  </div>
</div>

<!-- NEW GROUP MODAL -->
<div id="new-group-modal" style="display:none">
  <div class="modal-overlay" onclick="closeModals()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">👥 Новая группа</div>
      <div id="new-group-error" class="modal-error"></div>
      <input type="text" id="group-name" placeholder="Название группы">
      <div class="add-row">
        <div class="modal-pfx" style="flex:1">
          <input type="text" id="group-member-username" placeholder="username" style="margin-bottom:0"
            oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_]/g,'')"
            onkeydown="if(event.key==='Enter')addGroupMember()">
        </div>
        <button class="add-btn" onclick="addGroupMember()">+</button>
      </div>
      <div class="member-chips" id="group-members"></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModals()">Отмена</button>
        <button class="btn-primary" onclick="createGroup()">Создать</button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div id="settings-modal" style="display:none">
  <div class="modal-overlay" onclick="closeModals()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">⚙️ Настройки</div>

      <!-- Avatar -->
      <div class="avatar-edit-wrap">
        <div class="big-avatar" id="settings-avatar" onclick="showAvatarOptions()" style="background:linear-gradient(135deg,#6c63ff,#8b85ff)">
          <span id="settings-avatar-initials"></span>
          <div class="avatar-overlay">📷</div>
        </div>
        <div class="avatar-options" id="avatar-options" style="display:none">
          <button class="avatar-opt-btn" onclick="triggerAvatarGallery()">🖼️ Галерея</button>
          <button class="avatar-opt-btn" onclick="triggerAvatarCamera()">📷 Камера</button>
          <button class="avatar-opt-btn" onclick="removeAvatar()">🗑️ Убрать</button>

        <input type="file" id="avatar-camera-input" accept="image/*" capture="user" style="display:none" onchange="handleAvatarChange(this)">
      </div>

      <div id="settings-success" class="modal-success"></div>
      <div id="settings-error" class="modal-error"></div>

      <div class="settings-section">
        <div class="settings-label">Профиль</div>
        <div class="input-group" style="margin-bottom:12px">
          <label>Имя</label>
          <input type="text" id="settings-name" placeholder="Ваше имя">
        </div>
        <div class="input-group" style="margin-bottom:12px">
          <label>Username</label>
          <div class="pfx">
            <input type="text" id="settings-username" placeholder="username"
              oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_]/g,'')">
          </div>
        </div>
        <div class="input-group" style="margin-bottom:12px">
          <label>Био</label>
          <input type="text" id="settings-bio" placeholder="Расскажи о себе...">
        </div>
        <div class="input-group" style="margin-bottom:0">
          <label>Статус</label>
          <input type="text" id="settings-status" placeholder="На связи, занят...">
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-label">Email</div>
        <div class="input-group" style="margin-bottom:0">
          <input type="email" id="settings-email" placeholder="email@example.com">
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-label">🎨 Тема оформления</div>
        <div class="themes-grid" id="themes-grid"></div>
      </div>

      <div class="settings-section">
        <div class="settings-label">Безопасность</div>
        <div class="input-group" style="margin-bottom:12px">
          <label>Новый пароль</label>
          <input type="password" id="settings-new-password" placeholder="Оставьте пустым чтобы не менять">
        </div>
        <div class="input-group" style="margin-bottom:0">
          <label>Текущий пароль (для подтверждения)</label>
          <input type="password" id="settings-current-password" placeholder="Введите текущий пароль">
        </div>
      </div>

      <div class="modal-actions" style="margin-top:8px">
        <button class="btn-cancel" onclick="closeModals()">Закрыть</button>
        <button class="btn-danger" onclick="logout()">Выйти</button>
        <button class="btn-primary" onclick="saveSettings()">Сохранить</button>
      </div>
    </div>
  </div>
</div>

const COLORS = [
  'linear-gradient(135deg,#6c63ff,#8b85ff)',
  'linear-gradient(135deg,#ff6584,#ff8fa3)',
  'linear-gradient(135deg,#43e97b,#38f9d7)',

];

function getColor(uid) { let h=0; for(let c of uid) h+=c.charCodeAt(0); return COLORS[h%COLORS.length]; }
function getInitials(name) { return name ? name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?'; }
function timeAgo(ts) {
  if(!ts) return '';
  const d=ts.toDate?ts.toDate():new Date(ts), now=new Date(), diff=now-d;
  if(diff<60000) return 'только что';
  if(diff<3600000) return Math.floor(diff/60000)+' мин';
  if(diff<86400000) return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('ru',{day:'2-digit',month:'2-digit'});
}
function formatTime(ts) { if(!ts) return ''; const d=ts.toDate?ts.toDate():new Date(ts); return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}); }
function formatDate(ts) { if(!ts) return ''; const d=ts.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString('ru',{day:'numeric',month:'long'}); }
function escAttr(s) { return (s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }



function showNotif(title, body) {
  const n=document.getElementById('notification');
  document.getElementById('notif-title').textContent=title;
  document.getElementById('notif-body').textContent=body;
  n.classList.add('show'); setTimeout(()=>n.classList.remove('show'),4000);
}

function renderMyAvatar(data) {
  const el = document.getElementById('my-avatar');
  if(data.photoURL) {
    el.innerHTML = `<img src="${data.photoURL}" alt="">`;
    el.style.background = 'none';
  } else {
    el.textContent = getInitials(data.name);
    el.style.background = getColor(data.uid);
  }
}

let isLogin = true;
window.toggleAuth = function() {
  isLogin = !isLogin;
  document.getElementById('auth-title').textContent = isLogin ? 'Добро пожаловать!' : 'Регистрация';
  document.getElementById('auth-sub').textContent = isLogin ? 'Войдите, чтобы общаться' : 'Создайте аккаунт';
  document.getElementById('auth-btn').textContent = isLogin ? 'Войти' : 'Зарегистрироваться';
  document.getElementById('name-group').style.display = isLogin ? 'none' : 'block';
  document.getElementById('username-group').style.display = isLogin ? 'none' : 'block';
  document.getElementById('auth-switch').innerHTML = isLogin
    ? 'Нет аккаунта? <a onclick="toggleAuth()">Зарегистрироваться</a>'
    : 'Уже есть аккаунт? <a onclick="toggleAuth()">Войти</a>';
};

document.getElementById('auth-btn').onclick = async () => {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const name = document.getElementById('auth-name').value.trim();
  const username = document.getElementById('auth-username').value.trim().toLowerCase();
  const errEl = document.getElementById('auth-error');
  errEl.style.display = 'none';
  try {
    if(isLogin) {
      await signInWithEmailAndPassword(auth, email, password);
    } else {
      if(!name) throw new Error('Введите имя');
      if(!username || username.length < 3) throw new Error('Username минимум 3 символа');
      const usnap = await getDocs(query(collection(db,'users'), where('username','==',username)));
      if(!usnap.empty) throw new Error('Username уже занят');
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
      await setDoc(doc(db,'users',cred.user.uid), { uid:cred.user.uid, name, username, email, createdAt:serverTimestamp() });
    }
  } catch(e) {
    errEl.textContent = e.message.replace('Firebase: ','').replace(/\(.*\)/,'').trim();
    errEl.style.display = 'block';
  }
};

['auth-email','auth-password','auth-name','auth-username'].forEach(id => {
  document.getElementById(id)?.addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('auth-btn').click(); });
});

window.signInGoogle = async function() {
  const errEl = document.getElementById('auth-error');
  errEl.style.display = 'none';
  try {
    const result = await signInWithPopup(auth, googleProvider);
    const user = result.user;
    const snap = await getDoc(doc(db,'users',user.uid));
    if(!snap.exists()) {
      let username = user.email.split('@')[0].toLowerCase().replace(/[^a-z0-9_]/g,'');
      // ensure unique
      const usnap = await getDocs(query(collection(db,'users'), where('username','==',username)));
      if(!usnap.empty) username = username + Math.floor(Math.random()*1000);
      await setDoc(doc(db,'users',user.uid), {
        uid: user.uid,
        name: user.displayName || username,
        username,
        email: user.email,
        photoURL: user.photoURL || '',
        createdAt: serverTimestamp()
      });
    }
  } catch(e) {
    errEl.textContent = e.message.replace('Firebase: ','').replace(/\(.*\)/,'').trim();
    errEl.style.display = 'block';
  }
};

window.logout = async () => { await signOut(auth); closeModals(); };

// ===== AUTH STATE =====
onAuthStateChanged(auth, async (user) => {
  if(user) {
    currentUser = user;
    let snap = await getDoc(doc(db,'users',user.uid));
    if(!snap.exists()) {
      const username = user.email.split('@')[0].toLowerCase().replace(/[^a-z0-9_]/g,'');
      await setDoc(doc(db,'users',user.uid), { uid:user.uid, name:user.displayName||username, username, email:user.email, photoURL:user.photoURL||'', createdAt:serverTimestamp() });
      snap = await getDoc(doc(db,'users',user.uid));
    }
    currentUserData = snap.data();
    document.getElementById('my-name').textContent = currentUserData.name;
    document.getElementById('my-username').textContent = '@'+(currentUserData.username||'');
    if(currentUserData.status) document.getElementById('my-username').textContent += ' · ' + currentUserData.status;
    renderMyAvatar(currentUserData);
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    // Update lastSeen
    updateDoc(doc(db,'users',user.uid), { lastSeen: serverTimestamp() });
    setInterval(() => updateDoc(doc(db,'users',user.uid), { lastSeen: serverTimestamp() }), 60000);
    subscribeToChats();
  } else {
    currentUser = null; currentUserData = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    if(unsubChats) unsubChats();
  }
});

// ===== CHATS =====
function subscribeToChats() {
  const q = query(collection(db,'chats'), where('members','array-contains',currentUser.uid));
  unsubChats = onSnapshot(q, snap => {
    snap.docChanges().forEach(change => {
      if(change.type === 'modified') {
        const chat = { id: change.doc.id, ...change.doc.data() };
        const prevChat = chats[chat.id];
        // Push notification for new message
        if(chat.lastMsg && chat.lastMsgAt && prevChat && chat.lastMsgAt?.toMillis?.() !== prevChat.lastMsgAt?.toMillis?.()) {
          const unread = chat.unread?.[currentUser.uid] || 0;
          if(unread > 0 && chat.id !== currentChatId) {
            sendPushNotif(getChatName(chat), chat.lastMsg);
          }
        }
      }
    });
    chats = {};
    snap.forEach(d => { chats[d.id] = { id:d.id, ...d.data() }; });
    renderChatList();
    maybeAskPush();
  });
}

function getChatName(c) {
  if(c.isGroup) return c.name||'Группа';
  if(c.memberNames) { const i=c.members.findIndex(u=>u!==currentUser.uid); return c.memberNames[i]||'Неизвестно'; }
  return c.name||'Чат';
}

function getChatAvatar(c) {
  if(c.isGroup) return null;
  if(c.memberPhotos) { const i=c.members.findIndex(u=>u!==currentUser.uid); return c.memberPhotos[i]||null; }
  return null;
}

function renderChatList(filter='') {
  const list = document.getElementById('chat-list');
  const sorted = Object.values(chats)
    .filter(c => activeTab==='direct'?!c.isGroup:activeTab==='groups'?c.isGroup:true)
    .sort((a,b) => (b.lastMsgAt?.toMillis?.())||0 - (a.lastMsgAt?.toMillis?.())||0)
    .filter(c => !filter || getChatName(c).toLowerCase().includes(filter.toLowerCase()));

  if(!sorted.length) { list.innerHTML=`<div class="no-chats">Нет чатов.<br>Нажмите ✏️ чтобы начать!</div>`; return; }

  list.innerHTML = sorted.map(c => {
    const name = getChatName(c);
    const photo = getChatAvatar(c);
    const color = c.isGroup ? 'linear-gradient(135deg,#43e97b,#38f9d7)' : getColor(c.otherUid||c.id);
    const avatarHtml = photo
      ? `<div class="avatar" style="background:none"><img src="${photo}" alt=""></div>`
      : `<div class="avatar" style="background:${color}">${c.isGroup?'👥':getInitials(name)}</div>`;
    const unread = c.unread?.[currentUser.uid] || 0;
    const badge = unread > 0 ? `<div class="unread-badge">${unread > 99 ? '99+' : unread}</div>` : '';
    return `<div class="chat-item${c.id===currentChatId?' active':''}" onclick="openChat('${c.id}')">
      ${avatarHtml}
      <div class="chat-info">
        <div class="chat-name">${name}</div>
        <div class="chat-preview">${c.lastMsg||'Нет сообщений'}</div>
      </div>
      <div class="chat-meta"><div class="chat-time">${timeAgo(c.lastMsgAt)}</div>${badge}</div>
    </div>`;
  }).join('');
}

window.openChat = async function(chatId) {
  currentChatId = chatId;
  const chat = chats[chatId];
  if(!chat) return;

  if(window.innerWidth<=640) {
    document.getElementById('sidebar').classList.add('hidden');
    document.getElementById('chat-main').classList.add('visible');
  }

  const name = getChatName(chat);
  const photo = getChatAvatar(chat);
  const color = chat.isGroup ? 'linear-gradient(135deg,#43e97b,#38f9d7)' : getColor(chat.otherUid||chatId);
  const avatarHtml = photo
    ? `<div class="avatar" style="width:40px;height:40px;border-radius:12px;background:none"><img src="${photo}"></div>`
    : `<div class="avatar" style="width:40px;height:40px;font-size:15px;border-radius:12px;background:${color}">${chat.isGroup?'👥':getInitials(name)}</div>`;

  document.getElementById('chat-main').innerHTML = `
    <div class="chat-header">
      <button class="back-btn" onclick="goBack()">‹</button>
      ${avatarHtml}
      <div class="chat-header-info">
        <div class="chat-header-name">${name}</div>
        <div class="chat-header-status" id="chat-status">${chat.isGroup?(chat.members?.length||0)+' участников':'...'}</div>
      </div>
    </div>
    <div class="messages-container" id="messages"></div>
    <div class="typing-wrap"><div class="typing-indicator" id="typing-indicator"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div><span id="typing-text"></span></div></div>
    <div class="chat-input-area">
      <div class="reply-preview" id="reply-preview" style="display:none">
        <div><b id="reply-name"></b><span id="reply-text"></span></div>
        <span class="reply-cancel" onclick="cancelReply()">✕</span>
      </div>
      <div class="editing-indicator" id="editing-indicator">
        <span>✏️ Редактирование</span>
        <span class="edit-cancel" onclick="cancelEdit()">✕</span>
      </div>
      <div class="input-row">
        <textarea id="msg-input" rows="1" placeholder="Сообщение..." onkeydown="handleMsgKey(event)" oninput="handleTyping();autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>`;

  if(unsubMsg) unsubMsg();
  const q = query(collection(db,'chats',chatId,'messages'), orderBy('createdAt','asc'));
  unsubMsg = onSnapshot(q, snap => renderMessages(snap, chatId));

  // Typing indicator
  onSnapshot(doc(db,'chats',chatId), snap => {
    const typing = snap.data()?.typing || {};
    const typers = Object.entries(typing)
      .filter(([uid,val]) => val && uid !== currentUser.uid)
      .map(([uid]) => {
        const chat = chats[chatId];
        const idx = chat?.members?.indexOf(uid);
        return chat?.memberNames?.[idx] || 'Кто-то';
      });
    const el = document.getElementById('typing-indicator');
    const txt = document.getElementById('typing-text');
    if(el && typers.length) {
      el.classList.add('show');
      if(txt) txt.textContent = typers.join(', ') + ' печатает...';
    } else if(el) {
      el.classList.remove('show');
    }
  });

  // Load other user's last seen for direct chats
  if(!chat.isGroup && chat.otherUid) {
    getDoc(doc(db,'users',chat.otherUid)).then(snap => {
      const statusEl = document.getElementById('chat-status');
      if(!statusEl) return;
      const data = snap.data();
      if(data?.lastSeen) {
        const d = data.lastSeen.toDate();
        const diff = Date.now() - d;
        if(diff < 300000) {
          statusEl.textContent = '● В сети';
          statusEl.style.color = 'var(--online)';
        } else {
          statusEl.textContent = 'Был(а) ' + timeAgo(data.lastSeen);
          statusEl.style.color = 'var(--text2)';
        }
      } else {
        statusEl.textContent = '';
      }
    });
  }
  if(window.innerWidth>640) setTimeout(()=>document.getElementById('msg-input')?.focus(), 100);
};

window.goBack = function() {
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('chat-main').classList.remove('visible');
  currentChatId = null;
  if(unsubMsg) { unsubMsg(); unsubMsg=null; }
};

function renderMessages(snap, chatId) {
  const container = document.getElementById('messages');
  if(!container) return;
  const msgs = [];
  snap.forEach(d => msgs.push({id:d.id,...d.data()}));

  let html='', lastDate='', lastSender=null, group=[];
  const flush = () => {
    if(!group.length) return;
    const isMe = group[0].senderId === currentUser.uid;
    html += `<div class="message-group ${isMe?'me':'them'}">`;
    if(!isMe && chats[chatId]?.isGroup) html += `<div class="msg-sender">${group[0].senderName||''}</div>`;
    group.forEach((msg,i) => {
      const isLast = i===group.length-1;
      // Reply bubble
      const replyHtml = msg.replyTo ? `<div class="reply-bubble"><b>${msg.replyTo.senderName}</b>${escHtml(msg.replyTo.text?.slice(0,60)||'')}</div>` : '';
      // Reactions
      let reactHtml = '';
      if(msg.reactions && Object.keys(msg.reactions).length) {
        const counts = {};
        const myReacts = new Set();
        Object.entries(msg.reactions).forEach(([uid,emoji]) => { counts[emoji]=(counts[emoji]||0)+1; if(uid===currentUser.uid) myReacts.add(emoji); });
        reactHtml = `<div class="reactions-bar">${Object.entries(counts).map(([emoji,cnt])=>`<span class="reaction-pill${myReacts.has(emoji)?' mine':''}" onclick="toggleReaction('${chatId}','${msg.id}','${emoji}')">${emoji}<span class="reaction-count">${cnt>1?cnt:''}</span></span>`).join('')}</div>`;
      }
      const edited = msg.edited ? ' <span style="font-size:11px;opacity:0.6">ред.</span>' : '';
      html += `<div class="message-wrap" data-id="${msg.id}" data-sender="${msg.senderId}" data-text="${escAttr(msg.text||'')}" data-chat="${chatId}"
        oncontextmenu="showMsgMenu(event,this)" ontouchstart="touchStart(event,this)" ontouchend="touchEnd()">
        ${replyHtml}
        <div class="message">${escHtml(msg.text||'')}${edited}</div>
      </div>`;
      if(isLast) html += `<div class="msg-time">${formatTime(msg.createdAt)}</div>`;
      if(reactHtml) html += reactHtml;
    });
    html += '</div>';
    group = [];
  };

  msgs.forEach(msg => {
    const ds = msg.createdAt ? formatDate(msg.createdAt) : '';
    if(ds && ds!==lastDate) { flush(); html+=`<div class="date-divider">${ds}</div>`; lastDate=ds; }
    if(msg.senderId!==lastSender) { flush(); lastSender=msg.senderId; }
    group.push(msg);
  });
  flush();
  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;

  // Clear unread
  if(currentChatId === chatId) {
    updateDoc(doc(db,'chats',chatId), { [`unread.${currentUser.uid}`]: 0 }).catch(()=>{});
  }
}

window.sendMessage = async function() {
  if(!currentChatId) return;
  const input = document.getElementById('msg-input');
  const text = input?.value?.trim();
  if(!text) return;

  input.value = '';
  input.style.height = 'auto';

  // Stop typing
  updateDoc(doc(db,'chats',currentChatId), { [`typing.${currentUser.uid}`]: false }).catch(()=>{});

  const msgData = {
    text, type:'text', senderId:currentUser.uid, senderName:currentUserData.name, createdAt:serverTimestamp()
  };

  // Reply
  if(replyingTo) {
    msgData.replyTo = { msgId: replyingTo.id, senderName: replyingTo.senderName, text: replyingTo.text };
    cancelReply();
  }

  // Edit
  if(editingMsgId) {
    await updateDoc(doc(db,'chats',currentChatId,'messages',editingMsgId), { text, edited:true });
    cancelEdit();
    return;
  }

  await addDoc(collection(db,'chats',currentChatId,'messages'), msgData);

  // Update last msg + unread for other members
  const chat = chats[currentChatId];
  const unreadUpdate = {};
  (chat?.members||[]).forEach(uid => { if(uid !== currentUser.uid) unreadUpdate[`unread.${uid}`] = (chat?.unread?.[uid]||0) + 1; });
  await updateDoc(doc(db,'chats',currentChatId), { lastMsg:text.slice(0,60), lastMsgAt:serverTimestamp(), ...unreadUpdate });
};

let replyingTo = null;
let editingMsgId = null;
let typingTimeout = null;

window.handleTyping = function() {
  if(!currentChatId) return;
  updateDoc(doc(db,'chats',currentChatId), { [`typing.${currentUser.uid}`]: true }).catch(()=>{});

  typingTimeout = setTimeout(() => {

    <div class="msg-action-item" onclick="copyText('${escAttr(text)}');closeMenu()">📋 Копировать</div>

window.toggleReaction = async function(chatId, msgId, emoji) {
  const msgRef = doc(db,'chats',chatId,'messages',msgId);
  const snap = await getDoc(msgRef);
  const reactions = snap.data()?.reactions || {};
  if(reactions[currentUser.uid] === emoji) {

  } else {
    reactions[currentUser.uid] = emoji;
  }
  await updateDoc(msgRef, { reactions });

window.handleAvatarChange = async function(input) {
  const file = input.files[0];
  if(!file) return;
  if(file.size > 500000) { showNotif('Ошибка','Фото слишком большое, максимум 500KB'); return; }
  const reader = new FileReader();
  reader.onload = async (e) => {
    const url = e.target.result;
    await updateProfile(currentUser, { photoURL: url });
    await updateDoc(doc(db,'users',currentUser.uid), { photoURL: url });
    currentUserData.photoURL = url;
    document.getElementById('settings-avatar').style.background='none';
    document.getElementById('settings-avatar-initials').innerHTML=`<img src="${url}" style="width:80px;height:80px;object-fit:cover;border-radius:20px">`;
    renderMyAvatar(currentUserData);
    document.getElementById('avatar-options').style.display='none';
    showNotif('Готово','Фото обновлено!');
  };
  reader.readAsDataURL(file);
};

window.saveSettings = async function() {
  const name = document.getElementById('settings-name').value.trim();
  const username = document.getElementById('settings-username').value.trim().toLowerCase();
  const email = document.getElementById('settings-email').value.trim();
  const newPass = document.getElementById('settings-new-password').value;
  const curPass = document.getElementById('settings-current-password').value;
  const errEl = document.getElementById('settings-error');
  const sucEl = document.getElementById('settings-success');
  errEl.style.display='none'; sucEl.style.display='none';

  try {
    if(!name) throw new Error('Имя не может быть пустым');
    if(username.length<3) throw new Error('Username минимум 3 символа');

    // Check username uniqueness
    if(username !== currentUserData.username) {
      const usnap = await getDocs(query(collection(db,'users'), where('username','==',username)));
      if(!usnap.empty) throw new Error('Username уже занят');
    }

    const needsReauth = (email !== currentUserData.email || newPass);
    if(needsReauth && !curPass) throw new Error('Введите текущий пароль для изменения email/пароля');

    if(needsReauth) {
      const cred = EmailAuthProvider.credential(currentUser.email, curPass);
      await reauthenticateWithCredential(currentUser, cred);
    }

    // Update name
    if(name !== currentUserData.name) {
      await updateProfile(currentUser, { displayName: name });
    }

    // Update email
    if(email !== currentUserData.email) {
      await updateEmail(currentUser, email);
    }

    // Update password
    if(newPass) {
      if(newPass.length < 6) throw new Error('Пароль минимум 6 символов');
      await updatePassword(currentUser, newPass);
    }

    // Update Firestore
    await updateDoc(doc(db,'users',currentUser.uid), { name, username, email, bio: document.getElementById('settings-bio').value.trim(), status: document.getElementById('settings-status').value.trim() });
    currentUserData = { ...currentUserData, name, username, email, bio: document.getElementById('settings-bio').value.trim(), status: document.getElementById('settings-status').value.trim() };

    document.getElementById('my-name').textContent = name;
    document.getElementById('my-username').textContent = '@'+username;

    sucEl.textContent = '✓ Изменения сохранены!';
    sucEl.style.display = 'block';
    document.getElementById('settings-new-password').value='';
    document.getElementById('settings-current-password').value='';
  } catch(e) {
    errEl.textContent = e.message.replace('Firebase: ','').replace(/\(.*\)/,'').trim();
    errEl.style.display='block';
  }
};

window.closeModals = function() {
  ['new-chat-modal','new-group-modal','settings-modal'].forEach(id => {
    document.getElementById(id).style.display='none';
  });
};

// ===== THEMES =====
window.applyTheme = function(themeId, el) {
  const body = document.body;
  body.className = themeId;
  localStorage.setItem('pg-theme', themeId);
  document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
  el.classList.add('active');
  showNotif('Тема изменена', '');
};

// Apply saved theme on load
const savedTheme = localStorage.getItem('pg-theme');
if(savedTheme) document.body.className = savedTheme;

// ===== PUSH NOTIFICATIONS =====
window.requestPushPermission = async function() {
  if(!('Notification' in window)) return;
  if(Notification.permission === 'granted') return;
  const perm = await Notification.requestPermission();
  if(perm === 'granted') showNotif('Уведомления включены', 'Будешь получать уведомления о новых сообщениях');
};

function sendPushNotif(title, body) {
  if(Notification.permission === 'granted' && document.hidden) {
    new Notification(title, { body, icon: '/pukangram-v2/icon.png' });
  }
}

// Ask for push on first chat open
let askedPush = false;
function maybeAskPush() {
  if(!askedPush && Notification.permission === 'default') {
    askedPush = true;
    setTimeout(() => requestPushPermission(), 2000);
  }
}
